<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Escape from Dinic: Murino Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Tahoma', sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #fff; 
            text-shadow: 2px 2px 5px #000; font-size: 18px; z-index: 100;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
/* Кнопки для телефона */
.mobile-controls {
    position: absolute; 
    bottom: 20px; 
    width: 100%; 
    display: flex; 
    justify-content: space-between; 
    padding: 0 20px; 
    box-sizing: border-box; 
    z-index: 1000;
}
.btn {
    width: 65px; height: 65px; 
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid #fff; 
    border-radius: 15px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 24px; font-weight: bold;
    user-select: none; touch-action: none;
}
.btn:active { background: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
<div class="mobile-controls">
    <div style="display:flex; gap:10px;">
        <div class="btn" id="mLeft">←</div>
        <div class="btn" id="mRight">→</div>
    </div>
    <div style="display:flex; gap:10px;">
        <div class="btn" id="mJump" style="background: rgba(52, 152, 219, 0.4);">↑</div>
        <div class="btn" id="mE" style="background: rgba(46, 204, 113, 0.4);">E</div>
    </div>
</div>
    <div id="ui"></div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

let state = 'BASEMENT'; // BASEMENT, HOUSE, YARD, RACING, END
let keysFound = 0;
let hasBasementKey = false;
let hasGas = false;
let message = "";
let alpha = 1; 

const player = {
    x: 100, y: 0, w: 30, h: 64, vx: 0, vy: 0,
    speed: 4.5, run: 7.5, dir: 1, hiding: false, grounded: false
};

const denis = {
    x: 2500, y: 0, w: 50, h: 140, speed: 2.3, chaseSpeed: 4.8,
    dir: -1, state: 'WANDER', targetX: 2500, active: false
};

let objects = [];
let platforms = [];
let cameraX = 0;
const keys = {};
// Функция для связи кнопок с игрой
function bindBtn(id, key) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
}

// Привязываем кнопки к клавишам
bindBtn('mLeft', 'KeyA');
bindBtn('mRight', 'KeyD');
bindBtn('mJump', 'Space');
bindBtn('mE', 'KeyE');

window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

// Рисование детализированного персонажа
function drawHuman(x, y, w, h, color, isDenis = false) {
    ctx.fillStyle = color;
    // Тело
    ctx.fillRect(x + w*0.2, y + h*0.3, w*0.6, h*0.4);
    // Голова
    ctx.beginPath();
    ctx.arc(x + w*0.5, y + h*0.15, w*0.35, 0, Math.PI*2);
    ctx.fill();
    // Ноги
    ctx.fillRect(x + w*0.2, y + h*0.7, w*0.2, h*0.3);
    ctx.fillRect(x + w*0.6, y + h*0.7, w*0.2, h*0.3);
    
    if (isDenis) {
        ctx.fillStyle = 'red';
        ctx.fillRect(x + w*0.3, y + h*0.1, 4, 2);
        ctx.fillRect(x + w*0.6, y + h*0.1, 4, 2);
    }
}

function initBasement() {
    state = 'BASEMENT';
    message = "Темный подвал... Найди ключ в хламе (E)";
    platforms = [{ x: 0, y: 550, w: 2500, h: 100 }];
    objects = [];
    // Много рандомного мусора
    let keyPlaced = false;
    for(let i=0; i<15; i++) {
        let isKey = !keyPlaced && (Math.random() > 0.8 || i === 14);
        if (isKey) keyPlaced = true;
        objects.push({ x: 300 + i*130, y: 510, w: 50, h: 40, type: 'junk', hasKey: isKey });
    }
    objects.push({ x: 2300, y: 410, w: 80, h: 140, type: 'door_to_house' });
}

function initHouse() {
    state = 'HOUSE';
    alpha = 1;
    player.x = 100; player.y = 800;
    denis.active = true;
    keysFound = 0;
    platforms = [
        { x: 0, y: 900, w: 4000, h: 40 }, 
        { x: 0, y: 650, w: 3500, h: 30 }, 
        { x: 500, y: 400, w: 3500, h: 30 }
    ];
    objects = [
        { x: 3300, y: 650, w: 80, h: 250, type: 'stairs', toY: 650 },
        { x: 600, y: 400, w: 80, h: 250, type: 'stairs', toY: 400 },
        { x: 3400, y: 510, w: 90, h: 140, type: 'lift' }
    ];
    // Рандомные шкафы
    let cabinets = [
        {x: 400, y: 800, lvl: 0}, {x: 1200, y: 800, lvl: 0}, {x: 2000, y: 800, lvl: 0},
        {x: 800, y: 550, lvl: 1}, {x: 1800, y: 550, lvl: 1}, {x: 2600, y: 550, lvl: 1},
        {x: 1000, y: 300, lvl: 2}, {x: 2200, y: 300, lvl: 2}
    ];
    // Перемешиваем и выбираем 3 с ключами
    cabinets.sort(() => Math.random() - 0.5);
    cabinets.forEach((c, idx) => {
        objects.push({ x: c.x, y: c.y, w: 60, h: 100, type: 'locker', hasKey: idx < 3 });
    });
}

function initYard() {
    state = 'YARD';
    alpha = 1;
    player.x = 100; player.y = 500;
    denis.active = false;
    hasGas = false;
    platforms = [{ x: 0, y: 600, w: 6000, h: 100 }];
    objects = [];
    // Рандомный бензин в кустах
    let gasIdx = Math.floor(Math.random() * 25);
    for(let i=0; i<35; i++) {
        objects.push({ x: 400 + i*150, y: 520, w: 70, h: 80, type: 'bush', hasGas: i === gasIdx });
    }
    objects.push({ x: 5800, y: 530, w: 100, h: 70, type: 'pitbike' });
}

function update() {
    if (alpha > 0) alpha -= 0.02;

    if (!player.hiding) {
        let s = keys['ShiftLeft'] ? player.run : player.speed;
        if (keys['KeyA']) { player.vx = -s; player.dir = -1; }
        else if (keys['KeyD']) { player.vx = s; player.dir = 1; }
        else { player.vx *= 0.8; }
if (keys['Space'] && player.grounded) {
    player.vy = -12;
    player.grounded = false;
}

        player.vy += 0.6;
        player.x += player.vx;
        player.y += player.vy;

        player.grounded = false;
        platforms.forEach(p => {
            if (player.x + player.w > p.x && player.x < p.x + p.w &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
                player.y = p.y - player.h; player.vy = 0; player.grounded = true;
            }
        });
    }

    cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;

    if (denis.active) {
        let dist = Math.abs(denis.x - player.x);
        let sameFloor = Math.abs(denis.y - player.y) < 150;

        if (player.hiding) { denis.state = 'WANDER'; }
        else if (dist < 650 && sameFloor) { denis.state = 'CHASE'; }

        if (denis.state === 'CHASE') denis.x += (player.x > denis.x ? 1 : -1) * denis.chaseSpeed;
        else {
            if (Math.abs(denis.x - denis.targetX) < 20) denis.targetX = Math.random() * 3500;
            denis.x += (denis.targetX > denis.x ? 1 : -1) * denis.speed;
        }
        platforms.forEach(p => { if (denis.x + denis.w > p.x && denis.x < p.x + p.w) denis.y = p.y - denis.h; });
        if (dist < 40 && sameFloor && !player.hiding) location.reload();
    }

    if (keys['KeyE']) {
        keys['KeyE'] = false;
        objects.forEach(obj => {
            if (Math.abs(player.x - obj.x) < 80) {
                if (obj.type === 'junk' && obj.hasKey) { hasBasementKey = true; message = "Ключ найден!"; }
                if (obj.type === 'door_to_house' && hasBasementKey) initHouse();
                if (obj.type === 'locker') {
                    player.hiding = !player.hiding;
                    if (obj.hasKey) { keysFound++; obj.hasKey = false; message = "Нашел ключ!"; }
                }
                if (obj.type === 'stairs') player.y = obj.toY - player.h;
                if (obj.type === 'lift' && keysFound >= 3) initYard();
                if (obj.type === 'bush' && obj.hasGas) { hasGas = true; message = "Бензин у тебя!"; }
                if (obj.type === 'pitbike' && hasGas) startRacing();
            }
        });
    }
}

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Фон
    ctx.fillStyle = state === 'YARD' ? '#050a05' : '#111';
    ctx.fillRect(cameraX, 0, canvas.width, canvas.height);

    platforms.forEach(p => {
        ctx.fillStyle = '#222';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#333';
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    objects.forEach(obj => {
        if (obj.type === 'junk') {
            ctx.fillStyle = '#444';
            ctx.fillRect(obj.x, obj.y+20, obj.w, obj.h-20); // Полочки/мусор
            ctx.fillStyle = '#222'; ctx.fillRect(obj.x+5, obj.y+25, obj.w-10, 5);
        } else if (obj.type === 'locker') {
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
            ctx.fillStyle = '#000'; ctx.fillRect(obj.x+obj.w-15, obj.y+40, 5, 20); // Ручка
        } else if (obj.type === 'bush') {
            ctx.fillStyle = '#1b4d3e';
            ctx.beginPath(); ctx.arc(obj.x+35, obj.y+40, 40, 0, Math.PI*2); ctx.fill();
        } else if (obj.type === 'pitbike') {
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === 'lift' || obj.type.includes('door')) {
            ctx.fillStyle = '#34495e'; ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        }
    });

    if (denis.active) drawHuman(denis.x, denis.y, denis.w, denis.h, '#000', true);
    if (!player.hiding) drawHuman(player.x, player.y, player.w, player.h, '#3498db');

    ctx.restore();
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0,0, canvas.width, canvas.height);

    ui.innerText = `Этап: ${state} | Ключи: ${keysFound}/3 | ${message}`;
}

// ГОНКА (ФИНАЛ)
let cars = [];
let raceTimer = 0;
let raceX = 0;

function startRacing() {
    state = 'RACING';
    alpha = 1;
    raceX = window.innerWidth / 2;
}

function updateRace() {
    if (alpha > 0) alpha -= 0.02;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#222'; ctx.fillRect(canvas.width/2-200, 0, 400, canvas.height);

    if (keys['KeyA'] && raceX > canvas.width/2-180) raceX -= 3;
    if (keys['KeyD'] && raceX < canvas.width/2+180) raceX += 3;

    // Питбайк игрока
    ctx.fillStyle = '#f1c40f'; ctx.fillRect(raceX - 15, canvas.height - 120, 30, 60);
    // Дiнiс на хвосте
    ctx.fillStyle = '#000'; ctx.fillRect(canvas.width/2 - 25, canvas.height - 50, 50, 40);

    raceTimer++;
    // Машины теперь реже и медленнее
    if (raceTimer % 115 === 0) cars.push({x: canvas.width/2 - 150 + Math.random()*300, y: -100});
    
    ctx.fillStyle = '#e74c3c';
    cars.forEach((c, i) => {
        c.y += 2; // Снизил скорость встречки
        ctx.fillRect(c.x-25, c.y, 50, 80);
        if (Math.abs(c.x - raceX) < 35 && Math.abs(c.y - (canvas.height - 120)) < 50) location.reload();
    });

    if (raceTimer > 3000) {
        state = 'END';
        ctx.fillStyle = '#fff'; ctx.font = 'bold 50px Arial';
        ctx.fillText('МУРИНО', canvas.width/2 - 100, canvas.height/2);
        ctx.font = '25px Arial'; ctx.fillText('ГГ: Всё?..', canvas.width/2 - 50, canvas.height/2 + 60);
    }
}

function gameLoop() {
    if (state === 'RACING') updateRace();
    else if (state !== 'END') { update(); draw(); }
    requestAnimationFrame(gameLoop);
}

initBasement();
gameLoop();
</script>
</body>
</html>
